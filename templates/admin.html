<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - LowCost Store</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--primary:#ff6b35;--dark:#0a0a0a;--dark2:#141414;--dark3:#1f1f1f;--card-bg:#181818;--text:#f0f0f0;--text-muted:#777;--accent:#ffd700;--border:#282828;}
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;}

  .navbar{background:rgba(10,10,10,0.97);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:20px;padding:12px 28px;}
  .logo{font-family:'Syne',sans-serif;font-size:1.45rem;font-weight:800;color:var(--primary);text-decoration:none;letter-spacing:-0.5px;}
  .logo span{color:var(--accent);}
  .nav-links{display:flex;gap:6px;margin-left:auto;}
  .nav-links a{color:var(--text-muted);text-decoration:none;padding:8px 13px;border-radius:8px;font-size:0.85rem;transition:all 0.2s;}
  .nav-links a:hover{color:var(--text);background:var(--dark3);}
  .cart-btn{background:var(--primary)!important;color:white!important;font-weight:700!important;position:relative;}
  .cart-badge{position:absolute;top:-7px;right:-7px;background:var(--accent);color:#000;border-radius:50%;width:19px;height:19px;font-size:0.62rem;font-weight:900;display:flex;align-items:center;justify-content:center;}

  .admin-wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
  .admin-card{
    background:var(--card-bg);border:1px solid var(--border);border-radius:20px;
    padding:36px 44px;width:100%;max-width:460px;text-align:center;
    box-shadow:0 24px 80px rgba(0,0,0,0.5);
    animation:slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

  .admin-avatar-wrap{position:relative;width:90px;height:90px;margin:0 auto 18px;}
  .admin-avatar{width:90px;height:90px;border-radius:50%;border:3px solid var(--primary);object-fit:cover;box-shadow:0 0 0 5px rgba(255,107,53,0.1);}
  .admin-status{position:absolute;bottom:4px;right:4px;width:16px;height:16px;background:#22c55e;border-radius:50%;border:2px solid var(--card-bg);}

  .admin-role{font-size:0.7rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--primary);margin-bottom:5px;}
  .admin-name{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;margin-bottom:22px;letter-spacing:-0.5px;}

  .admin-details{display:flex;flex-direction:column;gap:10px;text-align:left;}
  .detail-row{
    display:flex;align-items:center;gap:12px;
    background:var(--dark3);padding:13px 14px;border-radius:12px;border:1px solid var(--border);
    transition:border-color 0.2s;
  }
  .detail-row:hover{border-color:rgba(255,107,53,0.3);}
  .detail-row img{width:20px;height:20px;opacity:0.8;flex-shrink:0;}
  .detail-label{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);}
  .detail-value{font-size:0.88rem;color:var(--text);margin-top:2px;}
  .detail-value a{color:var(--primary);text-decoration:none;}
  .detail-value a:hover{text-decoration:underline;}

  .btn-home{display:inline-flex;align-items:center;gap:6px;margin-top:24px;padding:12px 30px;background:var(--primary);color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:0.9rem;transition:all 0.2s;box-shadow:0 4px 16px rgba(255,107,53,0.2);}
  .btn-home:hover{background:#e55a26;transform:translateY(-1px);}
</style>
</head>
<body>
<nav class="navbar">
  <a href="/" class="logo">Low<span>Cost</span> Store</a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/cart" class="cart-btn">
      🛒 Cart
      {% if cart_count > 0 %}<span class="cart-badge">{{ cart_count }}</span>{% endif %}
    </a>
  </div>
</nav>

<div class="admin-wrapper">
  <div class="admin-card">
    <div class="admin-avatar-wrap">
      <img class="admin-avatar" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Admin">
      <div class="admin-status"></div>
    </div>
    <div class="admin-role">Store Admin</div>
    <div class="admin-name">Bala Murugan G</div>

    <div class="admin-details">
      <div class="detail-row">
        <img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" alt="LinkedIn">
        <div>
          <div class="detail-label">LinkedIn</div>
          <div class="detail-value"><a href="https://www.linkedin.com/in/bala-murugan-g-409091301" target="_blank">bala-murugan-g-409091301</a></div>
        </div>
      </div>
      <div class="detail-row">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
        <div>
          <div class="detail-label">WhatsApp</div>
          <div class="detail-value">+91 8189873609</div>
        </div>
      </div>
      <div class="detail-row">
        <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png" alt="Email">
        <div>
          <div class="detail-label">Email</div>
          <div class="detail-value">balamuruganpvt@gmail.com</div>
        </div>
      </div>
    </div>

    <a href="/" class="btn-home">← Back to Store</a>
  </div>
</div>
</body>
</html>
