<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - LowCost Store</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #ff6b35; --primary-dark: #e55a26;
    --dark: #0f0f0f; --dark2: #1a1a1a; --dark3: #252525;
    --card-bg: #1e1e1e; --text: #f0f0f0; --text-muted: #888;
    --accent: #ffd700; --border: #2e2e2e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  .navbar { background: rgba(15,15,15,0.95); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 20px; padding: 14px 32px; }
  .logo { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--primary); text-decoration: none; }
  .logo span { color: var(--accent); }
  .nav-links { display: flex; gap: 8px; margin-left: auto; }
  .nav-links a { color: var(--text-muted); text-decoration: none; padding: 8px 14px; border-radius: 6px; font-size: 0.9rem; transition: all 0.2s; }
  .nav-links a:hover { color: var(--text); background: var(--dark3); }
  .cart-btn { background: var(--primary) !important; color: white !important; font-weight: 600 !important; position: relative; }
  .cart-badge { position: absolute; top: -6px; right: -6px; background: var(--accent); color: var(--dark); border-radius: 50%; width: 18px; height: 18px; font-size: 0.65rem; font-weight: 800; display: flex; align-items: center; justify-content: center; }

  .admin-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .admin-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px 48px;
    width: 100%; max-width: 480px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .admin-avatar {
    width: 90px; height: 90px; border-radius: 50%;
    border: 3px solid var(--primary);
    margin: 0 auto 20px;
    object-fit: cover;
  }
  .admin-title { font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--primary); margin-bottom: 6px; }
  .admin-name { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; margin-bottom: 28px; }
  .admin-details { display: flex; flex-direction: column; gap: 12px; text-align: left; }
  .detail-row {
    display: flex; align-items: center; gap: 14px;
    background: var(--dark3); padding: 14px 16px; border-radius: 10px;
    border: 1px solid var(--border);
  }
  .detail-row img { width: 22px; height: 22px; opacity: 0.8; flex-shrink: 0; }
  .detail-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
  .detail-value { font-size: 0.92rem; color: var(--text); margin-top: 2px; }
  .detail-value a { color: var(--primary); text-decoration: none; }
  .detail-value a:hover { text-decoration: underline; }
  .btn-home { display: inline-block; margin-top: 28px; padding: 12px 32px; background: var(--primary); color: white; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 0.95rem; transition: background 0.2s; }
  .btn-home:hover { background: var(--primary-dark); }
</style>
</head>
<body>
<nav class="navbar">
  <a href="/" class="logo">Low<span>Cost</span> Store</a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/cart" class="cart-btn">
      🛒 Cart
      {% if cart_count > 0 %}<span class="cart-badge">{{ cart_count }}</span>{% endif %}
    </a>
  </div>
</nav>

<div class="admin-wrapper">
  <div class="admin-card">
    <img class="admin-avatar" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Admin">
    <div class="admin-title">Store Admin</div>
    <div class="admin-name">Bala Murugan G</div>
    <div class="admin-details">
      <div class="detail-row">
        <img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" alt="LinkedIn">
        <div>
          <div class="detail-label">LinkedIn</div>
          <div class="detail-value"><a href="https://www.linkedin.com/in/bala-murugan-g-409091301" target="_blank">bala-murugan-g-409091301</a></div>
        </div>
      </div>
      <div class="detail-row">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
        <div>
          <div class="detail-label">WhatsApp</div>
          <div class="detail-value">+91 8189873609</div>
        </div>
      </div>
      <div class="detail-row">
        <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png" alt="Email">
        <div>
          <div class="detail-label">Email</div>
          <div class="detail-value">balamuruganpvt@gmail.com</div>
        </div>
      </div>
    </div>
    <a href="/" class="btn-home">← Back to Store</a>
  </div>
</div>
</body>
</html>
